<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ElioShop PRO</title>
  <style>
    body{margin:0;font-family:Arial;background:#f3f3f3}
    .navbar{background:#131921;color:#fff;display:flex;align-items:center;padding:10px;gap:10px}
    .logo{font-size:22px;font-weight:bold;color:#ff9900}
    .search{flex:1}
    .search input{width:100%;padding:8px;border-radius:4px;border:none}
    .cart{background:#ff9900;color:#000;padding:6px 10px;border-radius:5px;cursor:pointer}

    .container{display:flex}
    .filters{width:200px;background:#fff;padding:10px}
    .grid{flex:1;display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:15px;padding:20px}

    .card{background:#fff;border-radius:8px;padding:10px;box-shadow:0 2px 5px rgba(0,0,0,0.1)}
    .card img{width:100%;height:150px;object-fit:cover}
    .title{font-size:14px;margin:8px 0}
    .price{color:#b12704;font-weight:bold}
    .btn{margin-top:8px;background:#ffd814;border:none;padding:8px;width:100%;border-radius:5px;cursor:pointer}

    .cart-panel{position:fixed;right:0;top:0;width:300px;height:100%;background:#fff;box-shadow:-2px 0 5px rgba(0,0,0,0.2);padding:15px;display:none;flex-direction:column}
    .cart-panel h2{margin-top:0}
    .cart-item{font-size:14px;margin-bottom:10px}
    .checkout{margin-top:auto;background:#ff9900;padding:10px;text-align:center;cursor:pointer}
  </style>
</head>
<body>

<div class="navbar">
  <div class="logo">ElioShop</div>
  <div class="search"><input type="text" id="search" placeholder="Buscar productos..."></div>
  <div class="cart" onclick="toggleCart()">🛒 Carrito (<span id="count">0</span>)</div>
</div>

<div class="container">
  <div class="filters">
    <h4>Filtros</h4>
    <label><input type="checkbox" value="tech" onchange="applyFilters()"> Tecnología</label><br>
    <label><input type="checkbox" value="ropa" onchange="applyFilters()"> Ropa</label>
  </div>
  <div class="grid" id="products"></div>
</div>

<div class="cart-panel" id="cartPanel">
  <h2>Carrito</h2>
  <div id="cartItems"></div>
  <div class="checkout">Pagar (simulado)</div>
</div>

<script>
const items=[
  {name:"Auriculares",price:29.99,cat:"tech",img:"https://picsum.photos/200?1"},
  {name:"iPhone",price:999.99,cat:"tech",img:"https://picsum.photos/200?2"},
  {name:"Zapatillas",price:49.99,cat:"ropa",img:"https://picsum.photos/200?3"},
  {name:"Sudadera",price:39.99,cat:"ropa",img:"https://picsum.photos/200?4"}
];

let cart=[];

function render(list){
  const container=document.getElementById("products");
  container.innerHTML="";
  list.forEach((p,i)=>{
    container.innerHTML+=`<div class='card'>
      <img src='${p.img}'>
      <div class='title'>${p.name}</div>
      <div class='price'>€${p.price}</div>
      <button class='btn' onclick='addToCart(${i})'>Añadir</button>
    </div>`;
  });
}

function addToCart(i){
  cart.push(items[i]);
  document.getElementById("count").innerText=cart.length;
  renderCart();
}

function renderCart(){
  const div=document.getElementById("cartItems");
  div.innerHTML="";
  cart.forEach(p=>{
    div.innerHTML+=`<div class='cart-item'>${p.name} - €${p.price}</div>`;
  });
}

function toggleCart(){
  const panel=document.getElementById("cartPanel");
  panel.style.display=panel.style.display==='flex'?'none':'flex';
}

function applyFilters(){
  const checks=document.querySelectorAll("input[type=checkbox]:checked");
  const values=[...checks].map(c=>c.value);
  if(values.length===0){render(items);return;}
  render(items.filter(p=>values.includes(p.cat)));
}

document.getElementById("search").addEventListener("input",e=>{
  const val=e.target.value.toLowerCase();
  render(items.filter(p=>p.name.toLowerCase().includes(val)));
});

render(items);
</script>

</body>
</html>
